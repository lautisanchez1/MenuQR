# Nombre fijo del proyecto: red DNS `postgres`, `minio`, etc. solo resuelven entre estos servicios.
name: menuqr

networks:
  menuqr:
    driver: bridge

services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-menuqr}
      POSTGRES_USER: ${POSTGRES_USER:-menuqr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-menuqr}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [menuqr]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-menuqr}"]
      interval: 5s
      retries: 5

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb"]
    volumes:
      - dynamodb_data:/home/dynamodblocal
    networks: [menuqr]

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks: [menuqr]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    networks: [menuqr]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin}
        mc mb local/${S3_BUCKET:-menuqr-images} --ignore-existing
        mc anonymous set public local/${S3_BUCKET:-menuqr-images}
        echo "Bucket created and configured"

  dynamo-setup:
    image: amazon/aws-cli:latest
    networks: [menuqr]
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-local}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-local}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 4
        aws dynamodb create-table \
          --table-name ${DYNAMO_TABLE:-menuqr-events} \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
            AttributeName=eventTypeTimestamp,AttributeType=S \
          --key-schema \
            AttributeName=PK,KeyType=HASH \
            AttributeName=SK,KeyType=RANGE \
          --local-secondary-indexes '[{"IndexName":"LSI-EventType","KeySchema":[{"AttributeName":"PK","KeyType":"HASH"},{"AttributeName":"eventTypeTimestamp","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 2>&1 | grep -v "ResourceInUseException" || true
        echo "DynamoDB tables ready"

  backend:
    build:
      context: ../../backend
      dockerfile: src/main/docker/Dockerfile.jvm
    depends_on:
      postgres:
        condition: service_healthy
      dynamodb-local:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-menuqr}
      DB_USER: ${POSTGRES_USER:-menuqr}
      DB_PASS: ${POSTGRES_PASSWORD:-menuqr}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      DYNAMO_TABLE: ${DYNAMO_TABLE:-menuqr-events}
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      S3_BUCKET: ${S3_BUCKET:-menuqr-images}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      QUARKUS_PROFILE: ${QUARKUS_PROFILE:-dev}
    volumes:
      - ../../backend/src/main/resources/privateKey.pem:/work/privateKey.pem:ro
      - ../../backend/src/main/resources/publicKey.pem:/work/publicKey.pem:ro
    networks: [menuqr]

  admin-frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../../frontend/admin:/app
      - admin_node_modules:/app/node_modules
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
      VITE_MENU_URL: ${VITE_MENU_URL:-http://localhost:5173}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    networks: [menuqr]

  menu-frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../../frontend/menu:/app
      - menu_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks: [menuqr]

volumes:
  postgres_data:
  dynamodb_data:
  minio_data:
  admin_node_modules:
  menu_node_modules:
