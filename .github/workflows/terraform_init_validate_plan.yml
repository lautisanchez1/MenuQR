name: terraform_init_validate_plan.yml
on:
  pull_request:
    paths:
      - "terraform/**"
      - "ml-training/**"
      - ".github/workflows/terraform.yml"
permissions:
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Init & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda artifacts
        run: bash ../ml-training/scripts/build_lambda_dists.sh

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        if: steps.aws.outputs.configured == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Setup Python
        if: steps.aws.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda artifacts
        if: steps.aws.outputs.configured == 'true'
        run: bash ../ml-training/scripts/build_lambda_dists.sh

      - name: Terraform init
        if: steps.aws.outputs.configured == 'true'
        run: terraform init -backend=false -input=false

      - name: Terraform plan
        if: steps.aws.outputs.configured == 'true'
        id: plan
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -input=false \
            -no-color \
            -out=tfplan \
            | tee plan.txt

      - name: Upload plan artifact
        if: steps.aws.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: |
            terraform/plan.txt
            terraform/tfplan
          retention-days: 7
