name: Terraform init, validate & plan

on:
  workflow_dispatch: 

  pull_request:

  push:

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Init & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda artifacts
        run: bash ../ml-training/scripts/build_lambda_dists.sh

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS secrets
        id: aws
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Repository secrets AWS_* are not set — terraform plan is skipped."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.aws.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        if: steps.aws.outputs.configured == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Setup Python
        if: steps.aws.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda artifacts
        if: steps.aws.outputs.configured == 'true'
        run: bash ../ml-training/scripts/build_lambda_dists.sh

      - name: Check remote state secrets
        id: tfbackend
        if: steps.aws.outputs.configured == 'true'
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: |
          if [ -n "$TF_STATE_BUCKET" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::TF_STATE_BUCKET / TF_STATE_DYNAMODB_TABLE not set — plan without remote backend."
          fi

      - name: Write backend config
        if: steps.aws.outputs.configured == 'true' && steps.tfbackend.outputs.configured == 'true'
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_STATE_BUCKET }}"
          dynamodb_table = "${{ secrets.TF_STATE_DYNAMODB_TABLE }}"
          key            = "menuqr/terraform.tfstate"
          region         = "us-east-1"
          encrypt        = true
          EOF

      - name: Terraform init
        if: steps.aws.outputs.configured == 'true'
        run: |
          if [ "${{ steps.tfbackend.outputs.configured }}" = "true" ]; then
            terraform init -backend-config=backend.hcl -input=false
          else
            terraform init -backend=false -input=false
          fi

      - name: Terraform plan
        if: steps.aws.outputs.configured == 'true'
        id: plan
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -input=false \
            -no-color \
            -out=tfplan \
            | tee plan.txt

      - name: Upload plan artifact
        if: steps.aws.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: |
            terraform/plan.txt
            terraform/tfplan
          retention-days: 7
