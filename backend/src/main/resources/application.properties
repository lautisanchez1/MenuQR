# Database (usuario/clave vía Secrets Manager si menudigital.datasource.secret-arn; si no, fallback DB_*)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/menudigital}
quarkus.datasource.credentials-provider=menudigital-db
quarkus.datasource.credentials-provider-name=menudigital-db-credentials
menudigital.datasource.secret-arn=${DB_SECRET_ARN:}
menudigital.datasource.fallback-username=${DB_USER:menudigital}
menudigital.datasource.fallback-password=${DB_PASS:menudigital}
menudigital.datasource.secret-cache-seconds=${DB_SECRET_CACHE_SECONDS:300}

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true

# JWT Security
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=menudigital
mp.jwt.verify.audiences=menudigital-app
smallrye.jwt.sign.key.location=privateKey.pem

# AWS S3
aws.s3.bucket=${S3_BUCKET:menudigital-images}
aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.endpoint-override=${S3_ENDPOINT:}
aws.s3.public-url=${S3_PUBLIC_URL:# Solo MinIO / S3 con endpoint custom (local). En AWS real no uses S3_ENDPOINT ? DefaultCredentialsProvider (rol IAM).
aws.s3.access-key=${AWS_ACCESS_KEY_ID:local}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:local}

# AWS DynamoDB (en AWS con rol IAM: las claves se obtienen del IAM role si no se definen aquť)
aws.dynamodb.table=${DYNAMO_TABLE:menudigital-events}
# Misma tabla que aws.dynamodb.table (AnalyticsService / repositorio legacy)
dynamodb.events.table=${DYNAMO_TABLE:menudigital-events}
aws.dynamodb.region=${AWS_REGION:us-east-1}
aws.dynamodb.endpoint-override=${DYNAMO_ENDPOINT:}
aws.dynamodb.access-key=${AWS_ACCESS_KEY_ID:}
aws.dynamodb.secret-key=${AWS_SECRET_ACCESS_KEY:}

# Health
quarkus.smallrye-health.root-path=/q/health

# OpenAPI / Swagger
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=MenuDigital API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Multi-tenant digital menu SaaS platform API

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.menudigital".level=DEBUG

# HTTP port
quarkus.http.port=8080

# Recommendations: per-tenant JSON in S3 (see RecommendationModelLoader). Bucket from env; key pattern default recommendations/{tenantId}/model.json.
recommendations.model.s3.bucket=${RECOMMENDATIONS_MODEL_S3_BUCKET:}
